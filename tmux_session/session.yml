name: fov_experiment
root: ./
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
startup_window: Docker

windows:
  - Docker:
      layout: tiled
      synchronize: after
      panes:
        # Observer UAV — change IP on-site
        - cd ~/git/mrs_docker-lazy/stacks/stack_observer && export DOCKER_HOST=tcp://192.168.69.163:2375
        # Flier UAV — change IP on-site
        - cd ~/git/mrs_docker-lazy/stacks/stack_flier && export DOCKER_HOST=tcp://192.168.69.164:2375
