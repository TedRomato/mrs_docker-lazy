world_origin:

  units: "LATLON" # {"UTM, "LATLON"}

  ## far away origin
  #origin_x: 49.361944
  #origin_y: 14.262167

  # closer origin 15m
  #origin_x: 49.3618298
  #origin_y: 14.2612994

  # closer origin 25m
  origin_x: 49.3618866
  origin_y: 14.2615978

safety_area:

  enabled: true

  horizontal:

    # the frame of reference in which the points are expressed
    frame_name: "latlon_origin"

    # polygon
    #
    # x, y [m] for any frame_name except latlon_origin
    # x = latitude, y = longitude [deg]  for frame_name=="latlon_origin"
    points: [
      49.361833, 14.260972,
      49.362778, 14.263472,
      49.361889, 14.263694,
      49.361722, 14.261250,
    ]

  vertical:

    # the frame of reference in which the max&min z is expressed
    frame_name: "world_origin"

    max_z: 35.0
    min_z: 1.0

